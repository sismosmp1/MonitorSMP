<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>SISMOS MP RECEPTOR</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050b14;
color:white;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
transition:.3s;
}

/* STATUS */

.status{
position:absolute;
top:20px;
left:20px;
right:20px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,.08);
padding:16px 20px;
border-radius:22px;
backdrop-filter:blur(10px);
}

.status-left{
display:flex;
align-items:center;
gap:12px;
}

.wifi{
font-size:28px;
animation:pulse 1s infinite;
}

.online{
display:flex;
flex-direction:column;
}

.online strong{
font-size:16px;
}

.online span{
font-size:12px;
opacity:.7;
}

.dot{
width:10px;
height:10px;
background:#00ff84;
border-radius:50%;
margin-left:10px;
animation:pulse 1s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.5);
opacity:.5;
}
}

/* RELOJ */

.reloj{
font-size:95px;
font-weight:900;
letter-spacing:3px;
text-shadow:0 0 25px rgba(255,255,255,.2);
}

.fecha{
margin-top:15px;
font-size:18px;
opacity:.8;
text-transform:capitalize;
}

.info{
position:absolute;
bottom:18px;
font-size:12px;
opacity:.5;
letter-spacing:1px;
}

/* ALERTA FUERTE */

.alerta{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#d50000;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999999;
text-align:center;
padding:25px;
animation:flash .5s infinite;
}

.alerta.active{
display:flex;
}

@keyframes flash{
50%{
background:#ff1744;
}
}

.alerta h1{
font-size:60px;
margin-bottom:20px;
}

.alerta p{
font-size:28px;
max-width:700px;
line-height:1.7;
}

.btnCerrar{
margin-top:35px;
padding:18px 34px;
border:none;
border-radius:20px;
background:white;
color:#d50000;
font-size:20px;
font-weight:900;
cursor:pointer;
}

/* ALERTA DÉBIL */

.toast{
position:fixed;
top:20px;
left:20px;
right:20px;
background:#ffcc00;
color:#111;
padding:18px;
border-radius:22px;
display:none;
z-index:999999;
box-shadow:0 10px 30px rgba(0,0,0,.3);
animation:slide .3s;
}

.toast.active{
display:block;
}

.toast h3{
font-size:20px;
margin-bottom:8px;
}

.toast p{
font-size:15px;
line-height:1.5;
}

@keyframes slide{
from{
transform:translateY(-100px);
opacity:0;
}

to{
transform:translateY(0);
opacity:1;
}
}

</style>

</head>

<body>

<!-- STATUS -->

<div class="status">

<div class="status-left">

<div class="wifi">

📶

</div>

<div class="online">

<strong>

CONECTADO

</strong>

<span>

Recibiendo datos en tiempo real

</span>

</div>

<div class="dot"></div>

</div>

<div>

SISMOS MP

</div>

</div>

<!-- RELOJ -->

<div class="reloj"
id="reloj">

00:00:00

</div>

<div class="fecha"
id="fecha">

Cargando fecha...

</div>

<div class="info">

SISMOS MP APP PAGINA RECEPTORA DE ALERTA SISMICA

</div>

<!-- ALERTA FUERTE -->

<div class="alerta"
id="alerta">

<h1 id="tituloAlerta">

🚨 ALERTA SÍSMICA

</h1>

<p id="mensajeAlerta">

Sismo detectado

</p>

<button class="btnCerrar"
onclick="detenerTodo()">

CERRAR ALERTA

</button>

</div>

<!-- ALERTA DÉBIL -->

<div class="toast"
id="toast">

<h3 id="tituloToast">

🟡 Movimiento detectado

</h3>

<p id="mensajeToast">

Información del evento

</p>

</div>

<!-- AUDIO ALERTA FUERTE -->

<audio id="audioFuerte"
preload="auto"
loop>

<source
src="https://raw.githubusercontent.com/sismosmp1/sismosmp-audio1/main/sirena_1min.mp3"
type="audio/mpeg">

</audio>

<!-- AUDIO ALERTA DÉBIL -->

<audio id="audioDebil"
preload="auto">

<source
src="https://assets.mixkit.co/active_storage/sfx/952/952-preview.mp3"
type="audio/mpeg">

</audio>

<!-- AUDIO EMERGENCIA -->

<audio id="audioEmergencia"
preload="auto">

<source
src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"
type="audio/mpeg">

</audio>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

/* FIREBASE */

const firebaseConfig = {

apiKey: "AIzaSyC6-l7pOmp6Pe374UqzvopTA_rtXZHv_78",

authDomain: "sismos-mp.firebaseapp.com",

databaseURL:
"https://sismos-mp-default-rtdb.firebaseio.com",

projectId: "sismos-mp",

storageBucket: "sismos-mp.firebasestorage.app",

messagingSenderId: "457482276777",

appId:
"1:457482276777:web:59907aef1e13b3c7f0beb8"

};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();

/* RELOJ */

function actualizarReloj(){

let ahora=new Date();

let hora=
ahora.toLocaleTimeString('es-MX');

let fecha=
ahora.toLocaleDateString('es-MX',{
weekday:'long',
year:'numeric',
month:'long',
day:'numeric'
});

document.getElementById("reloj")
.innerHTML=hora;

document.getElementById("fecha")
.innerHTML=fecha;

}

setInterval(actualizarReloj,1000);

actualizarReloj();

/* VOZ */

function hablar(texto){

speechSynthesis.cancel();

let voz=
new SpeechSynthesisUtterance(texto);

voz.lang="es-MX";

voz.rate=.95;

voz.pitch=1;

speechSynthesis.speak(voz);

}

/* ALERTA FUERTE */

function mostrarAlerta(data){

let alerta=
document.getElementById("alerta");

document.body.style.background=
"#d50000";

document.getElementById("tituloAlerta")
.innerHTML=
data.titulo || "🚨 ALERTA SÍSMICA";

document.getElementById("mensajeAlerta")
.innerHTML=
data.mensaje || "Sismo detectado";

alerta.classList.add("active");

/* FULLSCREEN */

if(document.documentElement.requestFullscreen){

document.documentElement.requestFullscreen();

}

/* VIBRACIÓN */

navigator.vibrate([
1000,300,
1000,300,
1000,
300,
1000
]);

/* SONIDO FUERTE */

let audio=
document.getElementById("audioFuerte");

audio.currentTime=0;

audio.volume=1;

audio.play();

/* VOZ */

hablar(
data.mensaje ||
"Alerta sísmica activada"
);

}

/* ALERTA DÉBIL */

function mostrarDebil(data){

let toast=
document.getElementById("toast");

document.getElementById("tituloToast")
.innerHTML=
data.titulo || "🟡 Movimiento detectado";

document.getElementById("mensajeToast")
.innerHTML=
data.mensaje || "Movimiento leve detectado";

toast.classList.add("active");

/* VIBRACIÓN SUAVE */

navigator.vibrate([
200,
100,
200
]);

/* SONIDO SUAVE */

let audio=
document.getElementById("audioDebil");

audio.currentTime=0;

audio.volume=.5;

audio.play();

/* VOZ */

hablar(
data.mensaje ||
"Movimiento leve detectado"
);

/* OCULTAR */

setTimeout(()=>{

toast.classList.remove("active");

},7000);

}

/* EMERGENCIA */

function mostrarEmergencia(data){

let alerta=
document.getElementById("alerta");

alerta.style.background=
"#ff9800";

document.body.style.background=
"#ff9800";

document.getElementById("tituloAlerta")
.innerHTML=
data.titulo || "⚠️ EMERGENCIA";

document.getElementById("mensajeAlerta")
.innerHTML=
data.mensaje || "Emergencia detectada";

alerta.classList.add("active");

/* FULLSCREEN */

if(document.documentElement.requestFullscreen){

document.documentElement.requestFullscreen();

}

/* VIBRACIÓN */

navigator.vibrate([
700,200,
700,200,
700
]);

/* SONIDO */

let audio=
document.getElementById("audioEmergencia");

audio.currentTime=0;

audio.volume=.9;

audio.play();

/* VOZ */

hablar(
data.mensaje ||
"Emergencia activada"
);

}

/* DETENER */

function detenerTodo(){

document.getElementById("alerta")
.classList.remove("active");

document.body.style.background=
"#050b14";

/* PAUSAR AUDIOS */

document.getElementById("audioFuerte")
.pause();

document.getElementById("audioDebil")
.pause();

document.getElementById("audioEmergencia")
.pause();

/* DETENER VIBRACIÓN */

navigator.vibrate(0);

/* DETENER VOZ */

speechSynthesis.cancel();

}

/* ESCUCHAR FIREBASE */

db.ref("alerta").on("value",(snap)=>{

let data=snap.val();

if(!data) return;

console.log(data);

/* ALERTA FUERTE */

if(data.tipo==="fuerte"){

mostrarAlerta(data);

}

/* ALERTA DÉBIL */

if(data.tipo==="debil"){

mostrarDebil(data);

}

/* EMERGENCIA */

if(data.tipo==="emergencia"){

mostrarEmergencia(data);

}

/* STOP */

if(data.tipo==="stop"){

detenerTodo();

}

});

</script>

</body>
</html>
